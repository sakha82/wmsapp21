<div class="flex items-center justify-center min-h-screen bg-gray-50">
  <div class="bg-white rounded-xl shadow-lg w-full max-w-4xl overflow-hidden">
    <div class="grid grid-cols-2">
      <!-- Left Section with Logo -->
      <div class="bg-[#CCE0FF33] bg-contain bg-bottom bg-no-repeat rounded-l-xl flex items-center justify-center min-h-96">
        <div class="m-auto h-full flex justify-center items-center">
          <img [src]="imagesUrl + 'homelogo.png'" alt="Logo" class="h-20">
        </div>
      </div>

      <!-- Right Section with Form -->
      <div class="pb-9 pe-7 pt-14 ps-7">
        <form [formGroup]="passwordResetForm" (ngSubmit)="onResetFormSubmitted()" class="space-y-6">
          <!-- Title -->
          <div>
            <p class="font-semibold text-4xl text-start">
              <span class="text-custom-blue-primary">Verkstad</span> Återställ lösenord
            </p>
          </div>

          <!-- Description -->
          <div>
            <p class="text-sm text-gray-600">
              Ange ditt nya lösenord nedan.
            </p>
          </div>

          <!-- New Password Field -->
          <div class="mb-3">
            <label for="newPassword" class="flex justify-start font-semibold text-sm mb-1">Nytt lösenord</label>
            <input 
              id="newPassword" 
              type="password" 
              formControlName="newPassword" 
              placeholder="Minst 6 tecken"
              class="w-full p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-custom-blue-primary"
              [ngClass]="{'border-red-500': passwordResetForm.get('newPassword')?.invalid && passwordResetForm.get('newPassword')?.touched}"
            />
            <p *ngIf="passwordResetForm.get('newPassword')?.invalid && passwordResetForm.get('newPassword')?.touched" class="text-red-500 text-xs mt-1">
              <span *ngIf="passwordResetForm.get('newPassword')?.errors?.['required']">Lösenord krävs.</span>
              <span *ngIf="passwordResetForm.get('newPassword')?.errors?.['minlength']">Lösenord måste vara minst 6 tecken.</span>
            </p>
          </div>

          <!-- Confirm Password Field -->
          <div class="mb-3">
            <label for="confirmPassword" class="flex justify-start font-semibold text-sm mb-1">Bekräfta lösenord</label>
            <input 
              id="confirmPassword" 
              type="password" 
              formControlName="confirmPassword" 
              placeholder="Bekräfta lösenord"
              class="w-full p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-custom-blue-primary"
              [ngClass]="{'border-red-500': (passwordResetForm.hasError('passwordMismatch') && passwordResetForm.touched) || (passwordResetForm.get('confirmPassword')?.invalid && passwordResetForm.get('confirmPassword')?.touched)}"
            />
            <p *ngIf="passwordResetForm.get('confirmPassword')?.invalid && passwordResetForm.get('confirmPassword')?.touched" class="text-red-500 text-xs mt-1">
              Bestättelse av lösenord krävs.
            </p>
            <p *ngIf="passwordResetForm.hasError('passwordMismatch') && passwordResetForm.touched" class="text-red-500 text-xs mt-1">
              Lösenorden matchar inte.
            </p>
          </div>

          <!-- Success Message -->
          <div *ngIf="successMessage" class="bg-green-50 border border-green-200 rounded-lg p-4 text-center">
            <p class="text-green-700 font-medium">{{ successMessage }}</p>
            <a (click)="navigateToLogin()" class="text-green-600 underline cursor-pointer text-sm mt-2 hover:text-green-800 transition">
              Tillbaka till inloggning
            </a>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit" 
            [disabled]="passwordResetForm.invalid || isLoading"
            class="w-full py-3 rounded-xl bg-[var(--color-primary)] text-white font-extrabold hover:bg-opacity-90 transition duration-150 shadow-md flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <span *ngIf="!isLoading">Återställ lösenord</span>
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12a8 8 0 018-8v8H4z"></path>
              </svg>
              Återställer...
            </span>
          </button>

          <!-- Back to Login Link -->
          <div class="text-center mt-6">
            <a 
              href="#" 
              (click)="navigateToLogin($event)"
              class="text-xs text-gray-500 hover:text-custom-blue-primary transition duration-150"
            >
              Tillbaka till inloggning
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
