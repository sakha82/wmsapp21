  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Vad ingår i priset på 199 kr/månad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "För 199 kr per användare och månad får du tillgång till alla funktioner i Digital Workshop – kundregister, offerthantering, arbetsorder, digital servicebok, schemaläggning, rapporter, statistik och vår AI Assistant.\n               I abonnemanget ingår dessutom 5 digitala serviceposter utan extra kostnad varje månad, så att du enkelt kan komma igång och visa värdet för dina kunder.\n               När du behöver registrera fler serviceposter kan du göra det flexibelt till en låg kostnad på endast 5 kr per extra digital servicepost.\n               Detta ger dig full kontroll över dina kostnader samtidigt som du kan växa i din egen takt och endast betala för det du faktiskt använder."
          }
        },
        {
          "@type": "Question",
          "name": "Vad är Digital Servicebok?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Genom att erbjuda en digital servicebok ger du dina kunder en tydlig och professionell översikt över allt arbete som utförts på deras fordon. Detta ökar förtroendet och stärker relationen mellan dig och dina kunder.\n               Systemet hjälper dig även att skapa bättre uppföljning, eftersom du enkelt kan se tidigare arbeten och planera framtida service. Det blir lättare att ge rätt rekommendationer och erbjuda proaktiv service.\n               Med en digital servicebok differentierar du din verkstad från konkurrenter och visar att du arbetar modernt och digitalt. Samtidigt bidrar det till ökad kundlojalitet och fler återkommande besök."
          }
        },
        {
          "@type": "Question",
          "name": "Får jag tillgång till nya uppdateringar inom samma pris?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, absolut. Vi utvecklar kontinuerligt Digital Workshop och lanserar nya funktioner varje månad – utan extra kostnad för dig. Alla förbättringar och nya funktioner ingår i din befintliga prenumeration.\n                Vi arbetar nära våra kunder och lyssnar aktivt på feedback och önskemål. Många av våra nya funktioner utvecklas direkt baserat på användarnas behov, vilket innebär att du som kund är med och påverkar produktens framtid."
          }
        },
        {
          "@type": "Question",
          "name": "Kan systemet integreras med mitt bokföringsprogram?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "För närvarande erbjuder vi inga färdiga integrationer med bokföringsprogram. Däremot utvecklar vi kontinuerligt nya funktioner baserat på våra kunders behov. Om det finns efterfrågan på integration med ditt bokföringsprogram prioriterar vi detta och arbetar för att kunna lansera det redan i kommande uppdateringar."
          }
        }
      ]
    }
